<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Monitor Energie PRO v2.1</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.header{padding:18px;text-align:center;font-size:28px;font-weight:bold;background:#111827}
.wrap{max-width:1100px;margin:auto;padding:15px}
.card{background:#1e293b;border-radius:18px;padding:18px;margin-bottom:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}
input,button{width:100%;padding:12px;border:none;border-radius:10px;box-sizing:border-box;margin-top:6px}
input{background:#f8fafc}
button{background:#22c55e;font-weight:bold}
.stat{font-size:30px;color:#22c55e;font-weight:bold}
.small{color:#cbd5e1}
.hist{background:#334155;padding:10px;border-radius:10px;margin-top:8px}
details{margin-top:8px}
</style>
</head>
<body>
<div class="header">⚡ Monitor Energie PRO v2.1</div>

<div class="wrap">

<div class="card">
<h2>📊 Dashboard General</h2>
<div class="small">Ultima actualizare: <span id="lastUpdate">-</span></div><br>
<div class="grid">
<div>
<b>ADMIRA</b>
<div class="stat" id="admiraKwh">0 kWh</div>
<div id="admiraLei">0 Lei</div>
</div>

<div>
<b>BERGHOUSE</b>
<div class="stat" id="bergKwh">0 kWh</div>
<div id="bergLei">0 Lei</div>
</div>

<div>
<b>TOTAL GENERAL</b>
<div class="stat" id="totalKwh">0 kWh</div>
<div id="totalLei">0 Lei</div>
</div>
</div>
</div>

<div class="card">
<h2>⚙️ Setări Tarife</h2>
<label>ADMIRA (Lei/kWh)</label>
<input id="tarif1" type="number" step="0.01" onchange="saveTarife()">
<label>BERGHOUSE (Lei/kWh)</label>
<input id="tarif2" type="number" step="0.01" onchange="saveTarife()">
</div>

<div class="grid">

<div class="card">
<h2>ADMIRA DISTRIBURION SRL</h2>
<label>Data citire</label>
<input id="data1" type="date">
<label>Index contor</label>
<input id="index1" type="number">
<button onclick="addReading('admira')">Salvează citire</button>
<div id="admiraLast"></div>
<div id="admiraHistory"></div>
</div>

<div class="card">
<h2>BERGHOUSE SRL</h2>
<label>Data citire</label>
<input id="data2" type="date">
<label>Index contor</label>
<input id="index2" type="number">
<button onclick="addReading('berg')">Salvează citire</button>
<div id="bergLast"></div>
<div id="bergHistory"></div>
</div>

</div>
</div>

<script>
function get(k){return JSON.parse(localStorage.getItem(k)||"[]")}
function set(k,v){localStorage.setItem(k,JSON.stringify(v))}

function saveTarife(){
 localStorage.setItem("tarif1",document.getElementById("tarif1").value);
 localStorage.setItem("tarif2",document.getElementById("tarif2").value);
 render();
}

function addReading(type){
 let idx=parseFloat(document.getElementById(type==="admira"?"index1":"index2").value);
 let dt=document.getElementById(type==="admira"?"data1":"data2").value;

 if(!dt || isNaN(idx)){alert("Completează toate câmpurile");return;}

 let arr=get(type);

 if(arr.length && idx<=arr[arr.length-1].index){
   alert("Indexul trebuie să fie mai mare decât ultima citire.");
   return;
 }

 arr.push({date:dt,index:idx});
 set(type,arr);
 render();
}

function monthName(d){
 const m=["Ianuarie","Februarie","Martie","Aprilie","Mai","Iunie","Iulie","August","Septembrie","Octombrie","Noiembrie","Decembrie"];
 let x=new Date(d);
 return m[x.getMonth()]+" "+x.getFullYear();
}

function renderFirm(type,history,lastBox,tarif){
 let arr=get(type);
 let tarifVal=parseFloat(localStorage.getItem(tarif)||0);

 let totalKwh=0,totalLei=0,lastKwh=0,lastLei=0;
 let html="";

 for(let i=1;i<arr.length;i++){
   let consum=arr[i].index-arr[i-1].index;
   let cost=consum*tarifVal;

   totalKwh+=consum;
   totalLei+=cost;

   lastKwh=consum;
   lastLei=cost;

   html+=`
   <div class="hist">
   <b>${monthName(arr[i].date)}</b><br>
   Consum: ${consum.toFixed(2)} kWh<br>
   Cost: ${cost.toFixed(2)} Lei
   <details>
   <summary>Detalii</summary>
   Index vechi: ${arr[i-1].index}<br>
   Index nou: ${arr[i].index}
   </details>
   </div>`;
 }

 document.getElementById(history).innerHTML=html;

 if(lastKwh>0){
  document.getElementById(lastBox).innerHTML=`
  <div class="hist">
  <b>Ultimul consum</b><br>
  ${lastKwh.toFixed(2)} kWh<br>
  ${lastLei.toFixed(2)} Lei
  </div>`;
 }

 return {kwh:totalKwh,lei:totalLei,last:arr.length?arr[arr.length-1].date:"-"};
}

function render(){
 document.getElementById("tarif1").value=localStorage.getItem("tarif1")||"";
 document.getElementById("tarif2").value=localStorage.getItem("tarif2")||"";

 let a=renderFirm("admira","admiraHistory","admiraLast","tarif1");
 let b=renderFirm("berg","bergHistory","bergLast","tarif2");

 document.getElementById("admiraKwh").innerText=a.kwh.toFixed(2)+" kWh";
 document.getElementById("bergKwh").innerText=b.kwh.toFixed(2)+" kWh";
 document.getElementById("totalKwh").innerText=(a.kwh+b.kwh).toFixed(2)+" kWh";

 document.getElementById("admiraLei").innerText=a.lei.toFixed(2)+" Lei";
 document.getElementById("bergLei").innerText=b.lei.toFixed(2)+" Lei";
 document.getElementById("totalLei").innerText=(a.lei+b.lei).toFixed(2)+" Lei";

 let last=a.last>b.last?a.last:b.last;
 document.getElementById("lastUpdate").innerText=last||"-";
}
render();
</script>
</body>
</html>
